<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<title>Cadastro</title>
		<meta charset="UTF-8" />
		<link rel="stylesheet" href="bootstrap5/css/bootstrap.min.css" />
		<script type="text/javascript" src="jquery-3.7.0.min.js"></script>
		<script type="text/javascript" src="projeto.js"></script>

	</head>
	<body>
		<header>
			<img src="73e5f3594d0c0b96c5cc3910ae2d4272.jpg" class="img-fluid" alt="Logotipo"/> 
		</header>
		<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
			<div class="container-fluid">
				<a class="navbar-brand" href="#">Music List</a>
			</div>
		</nav>	
		<div class="container">		
			<div class="row">
				<div class="col-md-6">
					<div class="mb-3 mt-3">
						<input type="text" class="form-control" id="nome" placeholder="Nome" />
					</div>
					<div class="mb-3">
						<input type="text" class="form-control" id="album" placeholder="Album" />
					</div>
					<div class="mb-3">
						<input type="number" class="form-control" id="tempo" placeholder="Duração" />
					</div>
					<div class="mb-3">
						<input type="number" class="form-control" id="data" placeholder="Data de lançamento" />
					</div>			
					<button class="btn btn-primary" id="btnSalvar">Salvar</button>
				</div>
				<div class="col-md-6">
					<p>Listagem de Musicas</p>
					<table class="table table-striped">
						<thead>
							<tr>
								<th scope="col">Nome</th>
								<th scope="col">Album</th>
								<th scope="col">Duração</th>
								<th scope="col">Data de lançamento</th>
								<th scope="col">Alterar</th>
							</tr>
						</thead>
						<tbody id="tabela">

						</tbody>
					</table>
				</div>
			</div>
		</div>		
	</body>
</html>
